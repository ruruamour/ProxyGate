services:
  proxygate:
    build:
      context: .
      args:
        RUNTIME_BASE_IMAGE: ${RUNTIME_BASE_IMAGE:-docker.m.daocloud.io/library/debian:bookworm-slim}
        GO_VERSION: ${GO_VERSION:-1.25.0}
        GO_DOWNLOAD_BASE: ${GO_DOWNLOAD_BASE:-https://golang.google.cn/dl}
        SINGBOX_DOWNLOAD_BASE: ${SINGBOX_DOWNLOAD_BASE:-https://ghproxy.net/https://github.com/SagerNet/sing-box/releases/download}
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-}
        http_proxy: ${DOCKER_BUILD_HTTP_PROXY:-}
        https_proxy: ${DOCKER_BUILD_HTTPS_PROXY:-}
        no_proxy: ${DOCKER_BUILD_NO_PROXY:-}

    container_name: ${CONTAINER_NAME:-proxygate}
    restart: unless-stopped
    ports:
      - "${STABLE_PORT:-7776}:7776"          # HTTP жЬАдљОеїґињЯ
      - "${RANDOM_PORT:-7777}:7777"          # HTTP йЪПжЬЇиљЃжНҐ
      - "${WEBUI_PORT:-7778}:7778"           # WebUIпЉИжЬЙзЩїељХиЃ§иѓБпЉЙ
      - "${SOCKS5_RANDOM_PORT:-7779}:7779"   # SOCKS5 йЪПжЬЇиљЃжНҐ
      - "${SOCKS5_STABLE_PORT:-7780}:7780"   # SOCKS5 жЬАдљОеїґињЯ
    volumes:
      - proxygate-data:/app/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - DATA_DIR=/app/data
      - WEBUI_PASSWORD=${WEBUI_PASSWORD:-proxygate}
      - PROXY_AUTH_ENABLED=${PROXY_AUTH_ENABLED:-false}
      - PROXY_AUTH_USERNAME=${PROXY_AUTH_USERNAME:-proxy}
      - PROXY_AUTH_PASSWORD=${PROXY_AUTH_PASSWORD}
      - BLOCKED_COUNTRIES=${BLOCKED_COUNTRIES:-CN}
      - ALLOWED_COUNTRIES=${ALLOWED_COUNTRIES}
      - CUSTOM_PROXY_MODE=${CUSTOM_PROXY_MODE:-mixed}
      - SINGBOX_PATH=sing-box
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7778/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  proxygate-data:
